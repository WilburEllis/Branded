// ═══ UTILITIES ═══
function fmt(v) { if (v === null || v === undefined || typeof v !== "number") return "—"; return "$" + v.toFixed(v < 2 ? 3 : 2); }
function fmtAc(v) { return "$" + v.toFixed(2) + "/ac"; }

function calcPPA(pkg, price, rateMin, rateUnit, sprayVol, dryOzPrice) {
  if (!price || rateMin == null || !rateUnit) return null;
  const u = rateUnit.toLowerCase(); const per100 = u.indexOf("/100") !== -1;
  if (dryOzPrice) return { val: price * rateMin, per100: false };
  const isDry = pkg && /\d+\s*LB/i.test(pkg);
  if (isDry) { if (u.indexOf("lb") !== -1) return { val: price * rateMin, per100: false }; if (u.indexOf("oz") !== -1) return { val: (price / 16) * rateMin, per100: false }; return null; }
  const upg = u.indexOf("qt") !== -1 ? 4 : u.indexOf("pt") !== -1 ? 8 : u.indexOf("gal") !== -1 ? 1 : 128;
  if (per100) return { val: (sprayVol / 100) * (price / upg) * rateMin, per100: true };
  return { val: (price / upg) * rateMin, per100: false };
}

function calcNTreatPPA(pricePerGal, rateQtPerTon, uanGalPerAcre) {
  if (!pricePerGal || !rateQtPerTon) return null;
  return (uanGalPerAcre * (rateQtPerTon / 4) * pricePerGal) / 180;
}
function calcUreaPPA(pricePerGal, rateQtPerTon, lbsUreaPerAcre) {
  if (!pricePerGal || !rateQtPerTon) return null;
  return lbsUreaPerAcre * (rateQtPerTon / 4) / 2000 * pricePerGal;
}

function resolvePrice(p, district, location, overridesMap) {
  if (location && overridesMap) {
    const key = p.item + ":" + location;
    const ov = overridesMap[key];
    if (ov && (ov.floor_price != null || ov.target_price != null)) {
      return { floor: ov.floor_price, target: ov.target_price, label: ov.location_name || location, isOverride: true };
    }
  }
  if (district === "wtx") return { floor: p.w_floor, target: p.w_target, label: "West TX", isOverride: false };
  return { floor: p.e_floor, target: p.e_target, label: "East TX", isOverride: false };
}

function hasDistrictPrice(p, district, location, overridesMap) {
  const r = resolvePrice(p, district, location, overridesMap);
  return r.target != null || r.floor != null;
}

        {open && (
          <div style={{ padding: "0 12px 10px", borderTop: "1px solid " + S.border }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6, marginTop: 8 }}>
              <div><div style={{ fontSize: 9, color: S.muted }}>COST</div><div style={{ fontSize: 14, fontWeight: 600, color: S.text, marginTop: 1 }}>{fmt(p.cost)}</div></div>
              <div><div style={{ fontSize: 9, color: S.muted }}>WHOLESALE</div><div style={{ fontSize: 14, fontWeight: 600, color: S.text, marginTop: 1 }}>{fmt(p.wholesale)}</div></div>
              <div><div style={{ fontSize: 9, color: S.muted }}>W FLOOR</div><div style={{ fontSize: 14, fontWeight: 600, color: S.amber, marginTop: 1 }}>{fmt(p.w_floor)}</div></div>
              <div><div style={{ fontSize: 9, color: S.muted }}>E FLOOR</div><div style={{ fontSize: 14, fontWeight: 600, color: S.green, marginTop: 1 }}>{fmt(p.e_floor)}</div></div>
            </div>
            {(rateStr || p.rate_note) && <div style={{ display: "inline-flex", alignItems: "center", background: "rgba(232,162,48,.1)", border: "1px solid rgba(232,162,48,.25)", borderRadius: 6, padding: "5px 9px", marginTop: 8 }}><span style={{ fontSize: 11, color: S.amber }}>🌿 {rateStr || ""}{rateStr && p.rate_note ? " · " : ""}{p.rate_note || ""}</span></div>}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginTop: 8 }}>
              {labelUrl ? <a href={labelUrl} target="_blank" rel="noopener" style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "rgba(76,175,106,.12)", border: "1px solid rgba(76,175,106,.35)", borderRadius: 6, padding: "7px 12px", textDecoration: "none", color: S.green, fontSize: 11, letterSpacing: .5, textTransform: "uppercase" }}>📄 Label</a>
                : <a href={"https://www.google.com/search?q=" + encodeURIComponent("Wilbur Ellis " + p.name + " label")} target="_blank" rel="noopener" style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "rgba(232,162,48,.1)", border: "1px solid rgba(232,162,48,.3)", borderRadius: 6, padding: "7px 12px", textDecoration: "none", color: S.amber, fontSize: 11, letterSpacing: .5, textTransform: "uppercase" }}>🔍 Search Label</a>}
              {productInfo[p.name] && <button onClick={e => { e.stopPropagation(); setShowInfo(true); }} style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "rgba(99,102,241,.12)", border: "1px solid rgba(99,102,241,.3)", color: "#818cf8", borderRadius: 8, padding: "7px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>📚 Product Info</button>}
            </div>
            <div style={{ fontSize: 10, color: S.border, marginTop: 7 }}>ITEM # {p.item} · {p.pkg} {p.uom || ""}</div>

      {showInfo && <InfoModal name={p.name} productInfo={productInfo} onClose={() => setShowInfo(false)} />}

  // ── ADMIN NATIONAL CARD ──

            <span style={{ fontSize: 15, color: S.muted, transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>⌄</span>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 1, background: S.border, margin: "0 12px 10px", borderRadius: 6, overflow: "hidden" }}>
          <div style={{ background: "#131c14", padding: "6px 8px" }}><div style={{ fontSize: 8, color: S.muted, textTransform: "uppercase", letterSpacing: .8, marginBottom: 2 }}>National Target</div><div style={{ fontSize: 17, fontWeight: 700, color: "#9ab8a0" }}>{fmt(p.nat_target)}</div></div>
          <div style={{ background: "#131c14", padding: "6px 8px" }}><div style={{ fontSize: 8, color: S.muted, textTransform: "uppercase", letterSpacing: .8, marginBottom: 2 }}>Floor (95%)</div><div style={{ fontSize: 17, fontWeight: 700, color: "#9ab8a0" }}>{p.nat_target != null ? fmt(Math.round(p.nat_target * 0.95 * 100) / 100) : "—"}</div></div>
        </div>
        {open && (
          <div style={{ padding: "0 12px 10px", borderTop: "1px solid " + S.border }}>
            {p.cost_2026 != null && p.nat_target != null && (() => {
              const mg = p.nat_target - p.cost_2026; const mp = ((mg / p.nat_target) * 100);
              return (<div style={{ background: "rgba(76,175,106,.08)", border: "1px solid rgba(76,175,106,.2)", borderRadius: 8, padding: "8px 10px", margin: "8px 0" }}>

                  <div><div style={{ fontSize: 9, color: S.muted }}>MARGIN %</div><div style={{ fontSize: 13, fontWeight: 700, color: mp >= 20 ? S.green : mp >= 10 ? S.amber : "#ef4444" }}>{mp.toFixed(1)}%</div></div>
                </div>
              </div>);
            })()}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginTop: 8 }}>
              <div><div style={{ fontSize: 9, color: S.muted }}>2026 Cost</div><div style={{ fontSize: 14, fontWeight: 600, color: S.text, marginTop: 1 }}>{fmt(p.cost_2026)}</div></div>
              <div><div style={{ fontSize: 9, color: S.muted }}>Package</div><div style={{ fontSize: 14, fontWeight: 600, color: S.text, marginTop: 1 }}>{p.pkg} {p.uom || ""}</div></div>

      </div>
      {showInfo && <InfoModal name={p.name} productInfo={productInfo} onClose={() => setShowInfo(false)} />}
    </React.Fragment>);
  }

  // ── SALES / MANAGER CARD ──
  let target, floor, label, accentColor;
  if (isNational) {
    target = p.nat_target; floor = target != null ? Math.round(target * 0.95 * 100) / 100 : null;
    label = "National"; accentColor = "#9ab8a0";
  } else {
    const pr = resolvePrice(p, district, location, overridesMap);
    target = pr.target; floor = pr.floor; label = pr.label;
    accentColor = pr.isOverride ? S.amber : district === "wtx" ? S.amber : S.green;
  }
  const activePrice = useFloor ? floor : target;
  const labelUrl = labelUrls[p.name];
  const rateStr = p.rate_min != null && p.rate_unit ? (p.rate_min === p.rate_max ? p.rate_min + " " + p.rate_unit : p.rate_min + "-" + p.rate_max + " " + p.rate_unit) : null;
  const rateNote = p.rate_note;

  let ppaSection = null;
  if (activePrice && p.rate_min != null && p.rate_unit) {
    const isNTreat = p.name && /^N-Treat/i.test(p.name);
    if (isNTreat) {
      const uan = calcNTreatPPA(activePrice, p.rate_min, 30);
      const urea = calcUreaPPA(activePrice, p.rate_min, 200);
      ppaSection = (uan || urea) ? (
        <div style={{ background: "rgba(76,175,106,.08)", border: "1px solid rgba(76,175,106,.2)", borderRadius: 8, padding: "8px 10px", margin: "8px 0" }}>
          <div style={{ fontSize: 9, color: S.green, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>💰 Cost Per Acre</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {uan && <div><div style={{ fontSize: 9, color: S.muted }}>UAN 32% (30 gal/ac)</div><div style={{ fontSize: 14, fontWeight: 700, color: S.green, marginTop: 2 }}>{fmtAc(uan)}</div></div>}
            {urea && <div><div style={{ fontSize: 9, color: S.muted }}>Urea (200 lbs/ac)</div><div style={{ fontSize: 14, fontWeight: 700, color: S.green, marginTop: 2 }}>{fmtAc(urea)}</div></div>}
          </div>
        </div>
      ) : null;
    } else {
      const ppa = calcPPA(p.pkg, activePrice, p.rate_min, p.rate_unit, 20, p.dry_oz_price);
      if (ppa) {
        ppaSection = (
          <div style={{ background: "rgba(76,175,106,.08)", border: "1px solid rgba(76,175,106,.2)", borderRadius: 8, padding: "8px 10px", margin: "8px 0" }}>
            <div style={{ fontSize: 9, color: S.green, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>💰 Cost Per Acre{ppa.per100 ? " (20 GPA)" : ""}</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: S.green }}>{fmtAc(ppa.val)}</div>
            <div style={{ fontSize: 10, color: S.muted, marginTop: 2 }}>@ {p.rate_min} {p.rate_unit} · {useFloor ? "Floor" : "Target"}</div>
          </div>
        );
      }
    }
  }

  const showManagerCompare = isManager && !isNational && locationIds && locationIds.length > 1;

  return (<React.Fragment>
    <div style={{ background: S.card, border: "1px solid " + S.border, borderRadius: 10, marginBottom: 8, overflow: "hidden" }}>
      <div onClick={() => setOpen(!open)} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "10px 12px", cursor: "pointer", userSelect: "none" }}>
        <div><div style={{ fontSize: 16, fontWeight: 700, color: "#eaf2eb", lineHeight: 1.2 }}>{p.name}</div>
          <div style={{ fontSize: 10, color: S.muted, marginTop: 2 }}>#{p.item} · {p.pkg}</div></div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {isOrg && <span style={{ display: "inline-flex", background: "rgba(74,222,128,.13)", border: "1px solid rgba(74,222,128,.35)", color: "#4ade80", borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 800 }}>◆ ORGANIC</span>}
          {p.cat && <span style={{ fontSize: 9, color: accentColor, background: "rgba(76,175,106,.1)", border: "1px solid rgba(76,175,106,.2)", padding: "2px 6px", borderRadius: 4 }}>{p.cat}</span>}
          <span style={{ fontSize: 15, color: S.muted, transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>⌄</span>
        </div>
      </div>

      {showManagerCompare ? (() => {
        const prices = locationIds.map(lid => {
          const pr = resolvePrice(p, district, lid, overridesMap);
          const loc = allLocations.find(l => l.id === lid);
          return { ...pr, locName: loc?.name || lid };
        });
        return (
          <div style={{ margin: "0 12px 10px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(" + prices.length + ",1fr)", gap: 1, background: S.border, borderRadius: 6, overflow: "hidden" }}>
              {prices.map(pr => (
                <div key={pr.locName} style={{ background: "#131c14", padding: "6px 8px" }}>
                  <div style={{ fontSize: 8, color: S.muted, textTransform: "uppercase", letterSpacing: .8, marginBottom: 2 }}>{pr.locName}{pr.isOverride ? " ★" : ""}</div>
                  <div style={{ fontSize: 17, fontWeight: 700, color: pr.isOverride ? S.blue : accentColor }}>{fmt(useFloor ? pr.floor : pr.target)}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })() : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 1, background: S.border, margin: "0 12px 10px", borderRadius: 6, overflow: "hidden" }}>
          <div onClick={() => setUseFloor(false)} style={{ background: !useFloor ? "#1a2a1b" : "#131c14", padding: "6px 8px", cursor: "pointer", borderLeft: !useFloor ? "3px solid " + S.green : "3px solid transparent" }}>
            <div style={{ fontSize: 8, color: !useFloor ? S.green : S.muted, textTransform: "uppercase", letterSpacing: .8, marginBottom: 2 }}>Target{!useFloor ? " ✓" : ""}</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: S.green }}>{fmt(target)}</div>
          </div>
          <div onClick={() => setUseFloor(true)} style={{ background: useFloor ? "#1e1e14" : "#131c14", padding: "6px 8px", cursor: "pointer", borderLeft: useFloor ? "3px solid " + S.amber : "3px solid transparent" }}>
            <div style={{ fontSize: 8, color: useFloor ? S.amber : S.muted, textTransform: "uppercase", letterSpacing: .8, marginBottom: 2 }}>Floor{useFloor ? " ✓" : ""}</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: S.amber }}>{fmt(floor)}</div>
          </div>
        </div>
      )}

      {open && (
        <div style={{ padding: "0 12px 10px", borderTop: "1px solid " + S.border }}>
          {ppaSection}
          {(rateStr || rateNote) && <div style={{ display: "inline-flex", alignItems: "center", background: "rgba(232,162,48,.1)", border: "1px solid rgba(232,162,48,.25)", borderRadius: 6, padding: "5px 9px", marginTop: 8 }}><span style={{ fontSize: 11, color: S.amber }}>🌿 {rateStr || ""}{rateStr && rateNote ? " · " : ""}{rateNote || ""}</span></div>}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginTop: 8 }}>
            <a href={"https://www.google.com/search?q=" + encodeURIComponent("Wilbur Ellis " + p.name + " label")} target="_blank" rel="noopener" style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "rgba(76,175,106,.12)", border: "1px solid rgba(76,175,106,.35)", borderRadius: 6, padding: "7px 12px", textDecoration: "none", color: S.green, fontSize: 11, letterSpacing: .5, textTransform: "uppercase" }}>🔍 Search Label</a>
            {productInfo[p.name] && <button onClick={e => { e.stopPropagation(); setShowInfo(true); }} style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "rgba(99,102,241,.12)", border: "1px solid rgba(99,102,241,.3)", color: "#818cf8", borderRadius: 8, padding: "7px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>📚 Product Info</button>}
          </div>
          <div style={{ fontSize: 10, color: S.border, marginTop: 7 }}>ITEM # {p.item} · {p.pkg}</div>
        </div>
      )}
    </div>
    {showInfo && <InfoModal name={p.name} productInfo={productInfo} onClose={() => setShowInfo(false)} />}
  </React.Fragment>);
}


// ═══ MAIN APP ═══
function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loginError, setLoginError] = useState("");
  const [loginLoading, setLoginLoading] = useState(false);
  const [initialLoading, setInitialLoading] = useState(true);
  const [connError, setConnError] = useState(null);

  const [txData, setTxData] = useState([]);
  const [natData, setNatData] = useState([]);
  const [overridesMap, setOverridesMap] = useState({});
  const [locations, setLocations] = useState([]);
  const [organicNames, setOrganicNames] = useState(new Set());
  const [productInfo, setProductInfo] = useState({});
  const [labelUrls, setLabelUrls] = useState({});

  const [search, setSearch] = useState("");
  const [view, setView] = useState("tx");
  const [catFilter, setCatFilter] = useState("ALL");
  const searchRef = useRef(null);

  useEffect(() => {
    let subscription;
    async function init() {
      try {
        const { data: { session: s } } = await supabase.auth.getSession();
        setSession(s);
        if (!s) setInitialLoading(false);
        const { data: { subscription: sub } } = supabase.auth.onAuthStateChange((_event, s) => {
          setSession(s);
          if (!s) { setProfile(null); setInitialLoading(false); }
        });
        subscription = sub;
      } catch (err) {
        console.error("Init error:", err);
        setConnError("Could not connect to Supabase: " + (err.message || String(err)));
        setInitialLoading(false);
      }
    }
    init();
    return () => { if (subscription) subscription.unsubscribe(); };
  }, []);

  useEffect(() => {
    if (!session) return;
    async function loadAll() {
      try {
        const { data: prof, error: profErr } = await supabase.from("profiles").select("*").eq("id", session.user.id).single();
        if (profErr) {
          console.error("Profile error:", profErr);
          setConnError("Logged in but no profile found for your user ID. You may need to add a row to the profiles table with id = " + session.user.id);
          setInitialLoading(false);
          return;
        }
        setProfile(prof);

        const { data: tx } = await supabase.from("v_tx_pricing").select("*").order("name");
        setTxData(tx || []);

        const { data: nat } = await supabase.from("national_prices").select("*").order("name");
        setNatData(nat || []);

        const { data: overrides } = await supabase.from("v_location_overrides").select("*");
        const oMap = {};
        (overrides || []).forEach(o => { oMap[o.item + ":" + o.location_id] = o; });
        setOverridesMap(oMap);

        const { data: locs } = await supabase.from("locations").select("*");
        setLocations(locs || []);

        const { data: orgSkus } = await supabase.from("skus").select("name").eq("is_organic", true);
        setOrganicNames(new Set((orgSkus || []).map(s => s.name)));

        const { data: pi } = await supabase.from("product_info").select("*");
        const piMap = {};
        (pi || []).forEach(p => { piMap[p.name] = p; });
        setProductInfo(piMap);

        const { data: lu } = await supabase.from("label_urls").select("*");
        const luMap = {};
        (lu || []).forEach(l => { luMap[l.name] = l.url; });
        setLabelUrls(luMap);

        setView(prof?.role === "admin" ? "tx" : "district");
      } catch (err) {
        console.error("Load error:", err);
        setConnError("Error loading data: " + (err.message || String(err)));
      }
      setInitialLoading(false);
    }
    loadAll();
  }, [session]);

  const handleLogin = useCallback(async (email, password) => {
    setLoginLoading(true);
    setLoginError("");
    try {
      const { error } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
      if (error) setLoginError(error.message);
    } catch (err) {
      setLoginError("Connection error: " + (err.message || String(err)));
    }
    setLoginLoading(false);
  }, []);

  const handleLogout = useCallback(async () => {
    await supabase.auth.signOut();
    setSession(null); setProfile(null);
    setSearch(""); setCatFilter("ALL"); setView("tx");
  }, []);

  const txCats = useMemo(() => {
    const cats = [...new Set(txData.map(p => p.cat).filter(Boolean))].sort();
    return ["ALL", ...cats];
  }, [txData]);

  const natAlpha = ["ALL", "A-F", "G-L", "M-R", "S-Z"];

  const districtProducts = useMemo(() => {
    if (!profile || profile.role === "admin") return [];
    const dist = profile.district;
    const loc = profile.location_ids?.[0] || null;
    return txData.filter(p => hasDistrictPrice(p, dist, loc, overridesMap));
  }, [profile, txData, overridesMap]);

  const districtCats = useMemo(() => {
    const cats = [...new Set(districtProducts.map(p => p.cat).filter(Boolean))].sort();
    return ["ALL", ...cats];
  }, [districtProducts]);

  const natOnlyProducts = useMemo(() => {
    if (!profile || profile.role === "admin") return [];
    const txItems = new Set(districtProducts.map(p => p.item));
    return natData.filter(p => !txItems.has(p.item) && p.nat_target != null);
  }, [profile, districtProducts, natData]);

  const organicDistrict = useMemo(() => districtProducts.filter(p => organicNames.has(p.name)), [districtProducts, organicNames]);
  const organicNatOnly = useMemo(() => {
    const distNames = new Set(organicDistrict.map(p => p.name));
    return natOnlyProducts.filter(p => organicNames.has(p.name) && !distNames.has(p.name));
  }, [organicDistrict, natOnlyProducts, organicNames]);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    const isAdmin = profile?.role === "admin";
    if (isAdmin) {
      if (view === "tx") return txData.filter(p => (catFilter === "ALL" || p.cat === catFilter) && (!q || p.name.toLowerCase().includes(q) || String(p.item).includes(q)));
      if (view === "nat") return natData.filter(p => {
        const first = p.name[0]?.toUpperCase();
        const mc = catFilter === "ALL" || (catFilter === "A-F" && first >= "A" && first <= "F") || (catFilter === "G-L" && first >= "G" && first <= "L") || (catFilter === "M-R" && first >= "M" && first <= "R") || (catFilter === "S-Z" && first >= "S" && first <= "Z");
        return mc && (!q || p.name.toLowerCase().includes(q) || String(p.item).includes(q));
      });
      if (view === "organic") {
        const txOrg = txData.filter(p => organicNames.has(p.name) && (!q || p.name.toLowerCase().includes(q)));
        const txOrgNames = new Set(txOrg.map(p => p.name));
        const natOrg = natData.filter(p => organicNames.has(p.name) && !txOrgNames.has(p.name) && (!q || p.name.toLowerCase().includes(q)));
        return { txOrg, natOrg };
      }
      if (view === "all") {
        const txItems = new Set(txData.map(p => p.item));
        const tf = txData.filter(p => !q || p.name.toLowerCase().includes(q) || String(p.item).includes(q));
        const nf = natData.filter(p => !txItems.has(p.item) && (!q || p.name.toLowerCase().includes(q) || String(p.item).includes(q)));
        return { tx: tf, nat: nf };
      }
    }
    if (view === "district") return districtProducts.filter(p => (catFilter === "ALL" || p.cat === catFilter) && (!q || p.name.toLowerCase().includes(q) || String(p.item).includes(q)));
    if (view === "national") return natOnlyProducts.filter(p => {
      const first = p.name[0]?.toUpperCase();
      const mc = catFilter === "ALL" || (catFilter === "A-F" && first >= "A" && first <= "F") || (catFilter === "G-L" && first >= "G" && first <= "L") || (catFilter === "M-R" && first >= "M" && first <= "R") || (catFilter === "S-Z" && first >= "S" && first <= "Z");
      return mc && (!q || p.name.toLowerCase().includes(q) || String(p.item).includes(q));
    });
    if (view === "organic") {
      const od = organicDistrict.filter(p => !q || p.name.toLowerCase().includes(q));
      const on = organicNatOnly.filter(p => !q || p.name.toLowerCase().includes(q));
      return { district: od, natOnly: on };
    }
    return [];
  }, [profile, view, catFilter, search, txData, natData, districtProducts, natOnlyProducts, organicDistrict, organicNatOnly, organicNames]);

  const groupByName = (arr) => {
    const g = {}; arr.forEach(p => { if (!g[p.name]) g[p.name] = []; g[p.name].push(p); });
    return Object.entries(g).sort((a, b) => a[0].localeCompare(b[0]));
  };

  if (connError) return <ErrorScreen error={connError} onRetry={() => window.location.reload()} />;
  if (initialLoading) return <LoadingScreen />;
  if (!session) return <LoginScreen onLogin={handleLogin} error={loginError} loading={loginLoading} />;
  if (!profile) return <LoadingScreen />;

  const isAdmin = profile.role === "admin";
  const dist = profile.district;
  const loc = profile.location_ids?.[0] || null;
  const locIds = profile.location_ids || [];
  const isManager = locIds.length > 1;
  const districtLabel = isManager ? (dist === "wtx" ? "West TX Manager" : "East TX Manager") : loc ? (locations.find(l => l.id === loc)?.name || dist) : dist === "wtx" ? "West Texas" : "East Texas";

  const tabs = isAdmin ? [
    { key: "tx", label: "TX Products" }, { key: "nat", label: "National Ref" },
    { key: "all", label: "All" }, { key: "organic", label: "◆ Organic", color: "#4ade80" },
  ] : [
    { key: "district", label: districtLabel + " Products" }, { key: "national", label: "National Ref" },
    { key: "organic", label: "◆ Organic", color: "#4ade80" },
  ];

  const pills = isAdmin
    ? (view === "tx" ? txCats : view === "nat" ? natAlpha : view === "organic" ? ["ALL"] : txCats)
    : (view === "district" ? districtCats : view === "national" ? natAlpha : ["ALL"]);

  const cardProps = { overridesMap, organicNames, productInfo, labelUrls, allLocations: locations };

  let content = null;
  let countText = "";

  if (isAdmin) {
    if (view === "tx") {
      const groups = groupByName(filtered);
      countText = groups.length + " products · " + filtered.length + " SKUs";
      content = groups.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} isAdmin={true} {...cardProps} />));
    } else if (view === "nat") {
      const groups = groupByName(filtered);
      countText = groups.length + " products · " + filtered.length + " SKUs";
      content = groups.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} isAdmin={true} isNational={true} {...cardProps} />));
    } else if (view === "organic") {
      const { txOrg, natOrg } = filtered;
      const txG = groupByName(txOrg); const natG = groupByName(natOrg);
      countText = (txG.length + natG.length) + " organic products";
      content = (<React.Fragment>
        {txG.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} isAdmin={true} {...cardProps} />))}
        {natG.length > 0 && <div style={{ fontSize: 10, color: S.muted, letterSpacing: 1, textTransform: "uppercase", padding: "10px 2px 5px", borderTop: "1px solid " + S.border, marginTop: 4 }}>NATIONAL REF ONLY — {natG.length} more</div>}
        {natG.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} isAdmin={true} isNational={true} {...cardProps} />))}
      </React.Fragment>);
    } else if (view === "all") {
      const { tx, nat } = filtered;
      const txG = groupByName(tx); const natG = groupByName(nat);
      countText = (txG.length + natG.length) + " products · " + (tx.length + nat.length) + " SKUs";
      content = (<React.Fragment>
        {txG.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} isAdmin={true} {...cardProps} />))}
        {natG.length > 0 && <div style={{ fontSize: 10, color: S.muted, letterSpacing: 1, textTransform: "uppercase", padding: "10px 2px 5px", borderTop: "1px solid " + S.border, marginTop: 4 }}>NATIONAL REF ONLY — {natG.length} more</div>}
        {natG.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} isAdmin={true} isNational={true} {...cardProps} />))}
      </React.Fragment>);
    }
  } else {
    if (view === "district") {
      const groups = groupByName(filtered);
      countText = groups.length + " products · " + filtered.length + " SKUs";
      content = groups.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} district={dist} location={loc} isManager={isManager} locationIds={locIds} {...cardProps} />));
    } else if (view === "national") {
      const groups = groupByName(filtered);
      countText = groups.length + " products · " + filtered.length + " SKUs";
      content = groups.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} district={dist} location={loc} isNational={true} isManager={isManager} locationIds={locIds} {...cardProps} />));
    } else if (view === "organic") {
      const { district: od, natOnly: on } = filtered;
      const dG = groupByName(od); const nG = groupByName(on);
      countText = (dG.length + nG.length) + " organic products";
      content = (<React.Fragment>
        {dG.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} district={dist} location={loc} isManager={isManager} locationIds={locIds} {...cardProps} />))}
        {nG.length > 0 && <div style={{ fontSize: 10, color: S.muted, letterSpacing: 1, textTransform: "uppercase", padding: "10px 2px 5px", borderTop: "1px solid " + S.border, marginTop: 4 }}>NATIONAL REF ONLY — {nG.length} more</div>}
        {nG.map(([n, items]) => items.map(p => <ProductCard key={p.item} p={p} district={dist} location={loc} isNational={true} isManager={isManager} locationIds={locIds} {...cardProps} />))}
      </React.Fragment>);
    }
  }

  return (
    <div style={{ minHeight: "100vh", background: S.bg, color: S.text, fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <header style={{ background: S.headerBg, borderBottom: "2px solid " + S.greenDim, padding: "12px 14px 8px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, color: S.green, letterSpacing: .5, textTransform: "uppercase" }}>📋 Price Lookup</div>
            <div style={{ fontSize: 10, color: S.muted, letterSpacing: 2, textTransform: "uppercase", marginTop: 1 }}>2026 TX Branded · Wilbur-Ellis{isAdmin ? "" : " · " + districtLabel}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 10, color: S.muted, background: S.tag, border: "1px solid " + S.border, padding: "3px 8px", borderRadius: 4 }}>{txData.length + " TX + " + natData.length + " Nat"}</span>
            <button onClick={handleLogout} style={{ fontSize: 10, color: "#ef4444", background: "rgba(239,68,68,.1)", border: "1px solid rgba(239,68,68,.2)", padding: "3px 8px", borderRadius: 4, cursor: "pointer" }}>Logout</button>
          </div>
        </div>
        <div style={{ position: "relative" }}>
          <input ref={searchRef} type="search" placeholder="Search product or item #..." value={search} onChange={e => setSearch(e.target.value)}
            style={{ width: "100%", background: S.inputBg, border: "1.5px solid " + S.border, borderRadius: 8, color: S.text, fontSize: 16, padding: "9px 36px 9px 12px", outline: "none", boxSizing: "border-box" }} />
          {search && <button onClick={() => { setSearch(""); searchRef.current?.focus(); }} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: S.muted, fontSize: 16, cursor: "pointer" }}>✕</button>}
        </div>
        <div style={{ overflowX: "auto", scrollbarWidth: "none", marginTop: 8 }}>
          <div style={{ display: "flex", borderBottom: "1px solid " + S.border, minWidth: "max-content" }}>
            {tabs.map(t => (
              <div key={t.key} onClick={() => { setView(t.key); setCatFilter("ALL"); }}
                style={{ fontSize: 11, color: view === t.key ? (t.color || S.green) : S.muted, padding: "6px 14px", cursor: "pointer", borderBottom: "2px solid " + (view === t.key ? (t.color || S.green) : "transparent"), whiteSpace: "nowrap", letterSpacing: .5, textTransform: "uppercase", userSelect: "none" }}>
                {t.label}
              </div>
            ))}
          </div>
        </div>
      </header>

      {!(isAdmin && view === "all") && (
        <div style={{ display: "flex", gap: 5, overflowX: "auto", padding: "8px 14px 2px", scrollbarWidth: "none" }}>
          {pills.map(c => (
            <button key={c} onClick={() => setCatFilter(c)}
              style={{ fontSize: 10, background: c === catFilter ? S.greenDim : S.tag, border: "1px solid " + (c === catFilter ? S.green : S.border), color: c === catFilter ? "#fff" : S.muted, borderRadius: 20, padding: "5px 11px", whiteSpace: "nowrap", cursor: "pointer", letterSpacing: .5, textTransform: "uppercase", flexShrink: 0 }}>
              {c === "ALL" ? "All" : c}
            </button>
          ))}
        </div>
      )}

      <div style={{ padding: "6px 12px 80px" }}>
        <div style={{ fontSize: 10, color: S.muted, letterSpacing: 1, textTransform: "uppercase", padding: "5px 0 6px" }}>{countText}</div>
        {content}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
